<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Page Not Found</title>

    <style>
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0f172a;
        color: #fff;
        font-family: Inter, sans-serif;
      }

      .box {
        text-align: center;
        max-width: 600px;
        padding: 40px;
      }

      h1 {
        font-size: 6rem;
        margin: 0;
        font-family: "JetBrains Mono", monospace;
      }

      h2 {
        margin: 10px 0 20px;
        font-size: 2rem;
      }

      p {
        color: #94a3b8;
        line-height: 1.6;
      }

      a {
        display: inline-block;
        margin-top: 30px;
        padding: 14px 26px;
        border: 1px solid #4f6fff;
        border-radius: 999px;
        color: white;
        text-decoration: none;
        transition: 0.25s;
      }

      a:hover {
        background: #4f6fff;
      }

      code {
        color: #6c83ff;
        font-family: "JetBrains Mono", monospace;
      }
    </style>
  </head>

  <body>
    <div class="box">
      <div class="terminal-404">
        <p><code>agatha@qa:~$ cd missing-page</code></p>

        <p><code>bash: page: No such file or directory</code></p>

        <h1>404</h1>

        <p>Looks like this page doesn't exist.</p>

        <a href="/">Return Home</a>
      </div>
    </div>
  </body>
</html>
